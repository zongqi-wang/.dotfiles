set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g mouse on
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g automatic-rename on

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind -r C-h previous-window
bind -r C-l next-window

bind f run-shell "$HOME/.local/bin/tmux-sessionizer"
bind a run-shell "$HOME/.local/bin/tmux-ai split"
bind A run-shell "$HOME/.local/bin/tmux-ai popup"

set -g status-position top
set -g status-interval 5
set -g status-left-length 24
set -g status-right-length 120
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left " #[bold]#S "
set -g status-right " #{pane_current_path} #[dim]%Y-%m-%d %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bold]#I:#W "
set -g window-status-separator ""
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335"
set -g mode-style "bg=#7aa2f7,fg=#1f2335"

if-shell "[ -f ~/.cache/wallust/colors-tmux.conf ]" "source-file ~/.cache/wallust/colors-tmux.conf"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @yank_selection "clipboard"

if-shell "[ -d ~/.tmux/plugins/tpm ]" "run-shell ~/.tmux/plugins/tpm/tpm"
